<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Classes</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>


<body>
  <!-- Sidebar -->

<div class="sidebar">

<h4><i class="fa-solid fa-calendar-days"></i> Timetable</h4>
<a href="/dashboard"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
<a href="/faculty-page"><i class="fa-solid fa-user-tie"></i> Faculty</a>
<a href="/rooms-page"><i class="fa-solid fa-door-open"></i> Rooms</a>
<a href="/subjects-page"><i class="fa-solid fa-book"></i> Subjects</a>
<a href="/classes-page"><i class="fa-solid fa-users"></i> Classes</a>
<a href="/allocation-page"><i class="fa-solid fa-list-check"></i> Allocation</a>
<a href="/timetable-page"><i class="fa-solid fa-table me-1"></i>Generate Timetable</a>


</div>

<!-- Main Content -->

<div class="main">

<div class="topbar">
<i class="fa-solid fa-users text-primary"></i>
<h4 class="fw-bold">Classes Management</h4>
</div>

<!-- Add Class -->



<h5>Add New Class</h5>
<div class="card p-3 mb-4 shadow-sm">
        <form method="POST" action="/add-class">
            <div class="row g-2">

                <div class="col-md-5">
                    <input type="text" name="class_name" class="form-control" placeholder="Class Name (e.g. MCA 1)" required>
                </div>

                <div class="col-md-5">
                    <input type="text" name="department" class="form-control" placeholder="Department" required>
                </div>

                <div class="col-md-2 d-flex">
                    <button type="submit" class="btn btn-success w-100">
                        <i class="fa-solid fa-plus"></i> Add
                    </button>
                </div>

            </div>
        </form>
    </div>


<!-- Classes Table -->

<div class="card p-3 shadow-sm">

<h5>Class List</h5>

<table class="table table-striped table-bordered mt-3">
   <thead class="table-dark">
                    <tr>
                        <th>Sr.No.</th>
                        <th>Class Name</th>
                        <th>Department</th>
                        <th>Action</th>
                    </tr>
                </thead>

        <tbody>
{% for row in classes %}

<tr>
    <td>{{ loop.index }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>
        <button class="btn btn-warning btn-sm"
                data-bs-toggle="modal"
                data-bs-target="#editModal{{ row[0] }}">
            <i class="fa-solid fa-pen"></i>
        </button>

        <a href="/delete-class/{{ row[0] }}" class="btn btn-danger btn-sm">
            <i class="fa-solid fa-trash"></i>
        </a>
    </td>
</tr>

<div class="modal fade" id="editModal{{ row[0] }}" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <form method="POST" action="/update-class/{{ row[0] }}">

                <div class="modal-header">
                    <h5 class="modal-title">Edit Class</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="text" name="class_name"
                           class="form-control mb-3"
                           value="{{ row[1] }}" required>

                    <input type="text" name="department"
                           class="form-control"
                           value="{{ row[2] }}" required>

                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-success">Update</button>
                </div>

            </form>

        </div>
    </div>
</div>

{% endfor %}
</tbody>

</table>

</div>

</div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</html>
