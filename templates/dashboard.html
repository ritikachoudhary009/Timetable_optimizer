<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="sidebar">
  <h3><i class="fa-solid fa-calendar-days"></i> Optimizer</h3>

<a href="/dashboard"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
<a href="/faculty-page"><i class="fa-solid fa-user-tie"></i> Faculty</a>
<a href="/rooms-page"><i class="fa-solid fa-door-open"></i> Rooms</a>
<a href="/subjects-page"><i class="fa-solid fa-book"></i> Subjects</a>
<a href="/classes-page"><i class="fa-solid fa-users"></i> Classes</a>
<a href="/allocation-page"><i class="fa-solid fa-list-check"></i> Allocation</a>
<a href="/timetable-page"><i class="fa-solid fa-table me-1"></i>Generate Timetable</a>



</div>

<div class="main">

<div class="topbar">
  <i class="fa-solid fa-chart-line fa-3x text-primary fa-lg"></i>
<h3>Admin Dashboard</h3>


</div>

<div class="cards">

<a href="/faculty-page" style="text-decoration:none; color:inherit;">
<div class="card-box">
  <i class="fa-solid fa-user-tie fa-3x text-primary fa-lg"></i>
  <h5>Total Faculty</h5>
  <p>{{ faculty_count }}</p>
</div>
</a>

<a href="/rooms-page" style="text-decoration:none; color:inherit;">
<div class="card-box">
  <i class="fas fa-door-open fa-2x text-primary fa-lg"></i>
  <h5>Total Rooms</h5>
  <p>{{ room_count }}</p>
</div>
</a>

<a href="/subjects-page" style="text-decoration:none; color:inherit;">
<div class="card-box">
  <i class="fas fa-book fa-2x text-primary fa-lg"></i>
  <h5>Total Subjects</h5>
  <p>{{ subject_count }}</p>
</div>
</a>

<a href="/classes-page" style="text-decoration:none; color:inherit;">
<div class="card-box">
  <i class="fa-solid fa-users text-primary me-2 fa-lg"></i>
  <h5>Classes</h5>
  <p>{{ class_count }}</p>
</div>
</a>

<a href="/timeslots-page" style="text-decoration:none; color:inherit;">
<div class="card-box">
<i class="fa-solid fa-clock text-primary fa-lg"></i>
<h5>Timeslots</h5>
</div>
</a>

<a href="/allocation-page" style="text-decoration:none; color:inherit;">
<div class="card-box">
<i class="fa-solid fa-calendar-check text-primary fa-lg"></i>
<h5>Allocation</h5>
</div>
</a>

</div>

</body>
</html>
