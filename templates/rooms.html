<!DOCTYPE html>
<html>

<head>

<title>Rooms</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<body>

<div class="sidebar">

 <h3><i class="fa-solid fa-calendar-days"></i> Optimizer</h3>

<a href="/dashboard"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
<a href="/faculty-page"><i class="fa-solid fa-user-tie"></i> Faculty</a>
<a href="/rooms-page"><i class="fa-solid fa-door-open"></i> Rooms</a>
<a href="/subjects-page"><i class="fa-solid fa-book"></i> Subjects</a>
<a href="/classes-page"><i class="fa-solid fa-users"></i> Classes</a>
<a href="/allocation-page"><i class="fa-solid fa-list-check"></i> Allocation</a>
<a href="/timetable-page"><i class="fa-solid fa-table me-1"></i>Generate Timetable</a>


</div>
<div class="main">

<div class="topbar">
<i class="fa-solid fa-user-tie text-primary me-2"></i>
<h3>Add Room</h3>
</div>



<h5>Add Room</h5>

<div class="card p-3 mb-4 shadow-sm">
     <form method="POST" action="/add-room">
            <div class="row g-2">

                <div class="col-md-5">
                    <input type="text" name="room_number" class="form-control" placeholder="Room Number" required>
                </div>

                <div class="col-md-5">
                    <input type="number" name="capacity" class="form-control" placeholder="Capacity" required>
                </div>

                <div class="col-md-3">
                 <select name="class_type" class="form-control">
                  <option>Theory</option>
                   <option>Lab</option>
                    </select>
                  </div>

                <div class="col-md-2 d-flex">
                    <button type="submit" class="btn btn-success w-100">
                        <i class="fa-solid fa-plus"></i> Add
                    </button>
                </div>

            </div>
        </form>
    </div>

<div class="card p-3 shadow-sm">

<h5>Classroom List</h5>

<div class="table-responsive">


    <table class="table table-striped table-bordered mt-3">

                <thead class="table-dark">
                    <tr>
                
                        <th>Room Number</th>
                        <th>Capacity</th>
                        <th>ClassType</th>
                        <th>Action</th>
                    </tr>
                </thead>

         <tbody>
{% for row in rooms %}

<tr>
   
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>

    <td>
        <button class="btn btn-warning btn-sm"
                data-bs-toggle="modal"
                data-bs-target="#editRoomModal{{ row[0] }}">
            <i class="fa-solid fa-pen"></i>
        </button>

        <a href="/delete-room/{{ row[1] }}" class="btn btn-danger btn-sm">
            <i class="fa-solid fa-trash"></i>
        </a>
    </td>
</tr>

<div class="modal fade" id="editRoomModal{{ row[0] }}" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <form method="POST" action="/update-room/{{ row[1] }}">

                <div class="modal-header">
                    <h5 class="modal-title">Edit Room</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="text" name="room_number" class="form-control mb-3"
                           value="{{ row[1] }}" required>

                    <input type="number" name="capacity" class="form-control mb-3"
                           value="{{ row[2] }}" required>

                    <input type="text" name="class_type" class="form-control"
                           value="{{ row[3] }}" required>

                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-success">Update</button>
                </div>

            </form>

        </div>
    </div>
</div>

{% endfor %}
</tbody>
        </table>

    </div>
</div>

</div>

</body>

</html>
