<!DOCTYPE html>
<html>
<head>
<title>Timeslots</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="sidebar">

<h3><i class="fa-solid fa-calendar-days"></i> Optimizer</h3>

<a href="/dashboard"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
<a href="/faculty-page"><i class="fa-solid fa-user-tie"></i> Faculty</a>
<a href="/rooms-page"><i class="fa-solid fa-door-open"></i> Rooms</a>
<a href="/subjects-page"><i class="fa-solid fa-book"></i> Subjects</a>
<a href="/classes-page"><i class="fa-solid fa-users"></i> Classes</a>
<a href="/allocation-page"><i class="fa-solid fa-list-check"></i> Allocation</a>
<a href="/timetable-page"><i class="fa-solid fa-table me-1"></i> Generate Timetable</a>

</div>


<div class="main">

<h3>Manage Timeslots</h3>

<div class="card p-3 mb-4 shadow-sm">
<form method="POST" action="/add-timeslot">
    <div class="row g-2">

        <div class="col-md-4">
            <input type="time" name="start_time" class="form-control" required>
        </div>

        <div class="col-md-4">
            <input type="time" name="end_time" class="form-control" required>
        </div>

        <div class="col-md-2">
            <button type="submit" class="btn btn-success w-100">Add</button>
        </div>
    
        </div>

    </div>
</form>
</div>

<table class="table table-bordered">
<thead class="table-dark">
<tr>
<th>Slot ID</th>
<th>Start Time</th>
<th>End Time</th>
</tr>
</thead>

<tbody>
{% for row in timeslots %}
<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
</tr>
{% endfor %}
</tbody>

</table>

</div>

</body>
</html>
